name: Latest Release
on:
  push:
    branches: ["ci-toolboxes"]

jobs:
  package:
    name: Package toolbox
    env:
      snapshot_version: v1.5.0
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          products: >
            Mapping_Toolbox
            Image_Processing_Toolbox
            Optimization_Toolbox
            MATLAB_Coder
      - name: Start virtual display server
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
      - name: Compile libtopotoolbox and MEX files
        uses: matlab-actions/run-build@v2
        with:
          tasks: compile
      - name: Build docs
        uses: matlab-actions/run-build@v2
        if: ${{ matrix.os != 'macos-latest' }}
        with:
          tasks: doc
      - name: Build package
        uses: matlab-actions/run-build@v2
        with:
          tasks: package
      - name: Upload toolbox as artifact
        uses: actions/upload-artifact@v4
        with:
          name: toolbox-${{ matrix.os }}
          path: release/TopoToolbox_*.mltbx
